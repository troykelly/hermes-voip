name: gate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21" # pin uv (AGENTS.md rule 33)
          enable-cache: true
      # uv reads .python-version and provisions that interpreter; --frozen
      # installs exactly from the committed uv.lock.
      - run: uv sync --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run python tools/check_database_exposure.py
      - run: uv run mypy
      - run: uv run pytest

  # Verifies the real hermes-agent surface still matches hermes_voip.hermes_surface
  # (the typed shim) AND type-checks + tests the VoipAdapter against the real
  # `gateway.platforms.base.BasePlatformAdapter`. The adapter imports the real
  # (un-`py.typed`) runtime, so it is excluded from the main no-hermes mypy gate
  # and checked HERE with the `hermes` extra installed (follow_untyped_imports
  # gives mypy genuine types — no `# type: ignore`/ignore_missing_imports).
  # Separate job so the heavy optional `hermes` extra and its transitive tree
  # stay out of the main gate's install / licence / audit scope.
  hermes-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      # The WebRTC inbound-branch adapter test (tests/test_adapter_webrtc.py) and the
      # SIP DTLS-SRTP inbound-branch test (tests/test_adapter_sip_dtls.py, ADR-0053 §6)
      # need the REAL hermes runtime AND the webrtc media stack (pyOpenSSL/aioice for
      # DTLS/ICE, opuslib + the system libopus for the Opus codec — ADR-0032), so this
      # job installs all three extras and libopus. Without them the test would skip in
      # BOTH the hermes-contract job (no webrtc extra) and the webrtc job (no hermes
      # extra) — i.e. never run. libopus0 is apt-installed explicitly (do not assume
      # the runner ships it).
      - run: sudo apt-get update && sudo apt-get install -y libopus0
      - run: uv sync --frozen --extra hermes --extra webrtc --extra media
      # Type-check the Hermes-dependent modules against the REAL base (these are
      # excluded from the default `uv run mypy` gate; passing them explicitly
      # bypasses the exclude). The end-to-end tests (SDES + WebRTC), reconnect
      # supervisor tests, the media-concurrency adapter isolation test, and the
      # WebRTC inbound-branch test all drive the real VoipAdapter, so they are
      # checked + run here too.
      - run: uv run mypy src/hermes_voip/adapter.py src/hermes_voip/voip_tools.py tests/test_adapter.py tests/test_adapter_caller_modes.py tests/test_adapter_call_progress.py tests/test_adapter_secure_media.py tests/test_adapter_session_timers.py tests/test_adapter_reconnect.py tests/test_adapter_rtcp.py tests/test_adapter_sip_dtls.py tests/test_adapter_webrtc.py tests/test_adapter_wss_signalling.py tests/test_media_concurrency_hermes.py tests/test_adapter_attended_consult.py tests/test_adapter_production_safety.py tests/test_adapter_observability.py tests/test_outbound_uri_injection.py tests/e2e/test_inbound_call.py tests/e2e/test_concurrent_inbound_calls.py tests/e2e/test_outbound_call.py tests/e2e/test_inbound_webrtc_call.py
      - env:
          HERMES_CONTRACT_REQUIRED: "1" # missing/drifted surface -> hard failure, never a silent skip
        run: uv run pytest tests/test_hermes_contract.py tests/test_adapter.py tests/test_adapter_caller_modes.py tests/test_adapter_call_progress.py tests/test_adapter_secure_media.py tests/test_adapter_session_timers.py tests/test_adapter_reconnect.py tests/test_adapter_rtcp.py tests/test_adapter_sip_dtls.py tests/test_adapter_webrtc.py tests/test_adapter_wss_signalling.py tests/test_media_concurrency_hermes.py tests/test_adapter_attended_consult.py tests/test_adapter_production_safety.py tests/test_adapter_observability.py tests/test_outbound_uri_injection.py tests/e2e -rs

  # Runs the conversational-provider tests with the optional `ml` extra installed
  # (onnxruntime + sherpa-onnx + numpy). Separate job so the heavy native ML stack
  # stays out of the main gate's install / licence / audit scope. The full suite is
  # re-run here so the ml-gated provider tests (which importorskip without the extra)
  # actually execute against the real runtime.
  providers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      - run: uv sync --frozen --extra ml
      # Prove the native ML stack actually loads (the onnx_compat shim runs first).
      - run: uv run python -c "from hermes_voip.providers.onnx_compat import ensure_sherpa_loadable; ensure_sherpa_loadable(); import onnxruntime, sherpa_onnx, numpy; print('ml stack:', onnxruntime.__version__, numpy.__version__)"
      - run: uv run pytest -rs

  # Runs the SRTP media-crypto tests (RFC 3711 known-answer vectors + functional
  # suite) with the optional `media` extra installed (pyca/cryptography).  Separate
  # job so the native OpenSSL binding stays out of the main gate's install / licence /
  # audit scope.  The full suite is re-run here so the media-gated SRTP tests (which
  # importorskip without the extra) actually execute against pyca/cryptography.
  media:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      - run: uv sync --frozen --extra media
      # Prove the cryptography library loads and the SRTP module is importable.
      - run: uv run python -c "import cryptography; from hermes_voip.media.srtp import SrtpSession, SrtpError; print('media stack cryptography', cryptography.__version__)"
      - run: uv run pytest -rs

  # Builds the wheel + sdist from a CLEAN environment (no editable dev install),
  # installs the built wheel into a fresh venv, and asserts the three release-
  # blocker properties:
  #   1. hermes_voip.__version__ resolves from installed distribution metadata
  #      (not the "0+unknown" fallback) and matches pyproject.toml [project].version.
  #   2. plugin.yaml is actually packaged INSIDE the wheel zipfile (hatchling does
  #      not include non-.py files by default; the pyproject.toml artifacts
  #      declaration is what causes it to land — this job proves it does).
  #   3. The hermes_agent.plugins entry point group resolves via
  #      importlib.metadata.entry_points() to hermes_voip, which exposes a
  #      `register` callable (the Hermes runtime entry point).
  #
  # A broken wheel (missing plugin.yaml, wrong/missing entry point, absent
  # metadata) would pass every other CI job green yet fail to load in the real
  # Hermes runtime. This job closes that gap. Separate job so the build +
  # fresh-venv install is isolated from the editable dev install used by the
  # other jobs (rule 11: never trust an agent's in-worktree install for
  # distribution verification).
  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      # Build wheel + sdist. No editable install: uv build uses a temporary
      # isolated build environment; the output lands in dist/.
      - run: uv build
      # Install the built wheel into a FRESH venv (not the dev venv). Using
      # uv pip install --python keeps us uv-only (rule 38). The venv lives
      # under the worktree-local dist dir so it is cleaned with the worktree
      # (rule 10: no /tmp build dirs).
      - run: uv venv dist/.smoke-venv
      - run: uv pip install --python dist/.smoke-venv/bin/python dist/*.whl
      # Assertion 1: __version__ resolves from installed metadata and matches
      # pyproject.toml [project].version (not the "0+unknown" fallback produced
      # when no distribution metadata is present).
      - name: assert version metadata
        run: |
          PYPROJECT_VER=$(uv run python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          INSTALLED_VER=$(dist/.smoke-venv/bin/python -c "import hermes_voip; print(hermes_voip.__version__)")
          echo "pyproject.toml version : $PYPROJECT_VER"
          echo "installed __version__  : $INSTALLED_VER"
          test "$INSTALLED_VER" != "0+unknown" || { echo "FAIL: __version__ is 0+unknown — no distribution metadata in wheel"; exit 1; }
          test "$INSTALLED_VER" = "$PYPROJECT_VER" || { echo "FAIL: __version__ ($INSTALLED_VER) != pyproject.toml ($PYPROJECT_VER)"; exit 1; }
          echo "PASS: version $INSTALLED_VER matches pyproject.toml"
      # Assertion 2: plugin.yaml is packaged inside the wheel zipfile.
      - name: assert plugin.yaml in wheel
        run: |
          dist/.smoke-venv/bin/python -c "
          import zipfile, glob, sys
          wheels = glob.glob('dist/*.whl')
          assert wheels, 'no wheel found in dist/'
          names = zipfile.ZipFile(wheels[0]).namelist()
          if not any(n.endswith('plugin.yaml') for n in names):
              print('FAIL: plugin.yaml NOT in wheel', wheels[0])
              print('Contents:', [n for n in names if 'plugin' in n or 'yaml' in n])
              sys.exit(1)
          print('PASS: plugin.yaml found in wheel', wheels[0])
          "
      # Assertion 3: hermes_agent.plugins entry point resolves to hermes_voip
      # with a `register` callable.
      - name: assert entry point resolves
        run: |
          dist/.smoke-venv/bin/python -c "
          from importlib.metadata import entry_points
          import sys
          eps = list(entry_points(group='hermes_agent.plugins'))
          voip = next((ep for ep in eps if ep.name == 'hermes-voip'), None)
          if voip is None:
              print('FAIL: no hermes-voip in hermes_agent.plugins entry points:', eps)
              sys.exit(1)
          module = voip.load()
          if not hasattr(module, 'register') or not callable(module.register):
              print('FAIL: hermes_voip.register not found or not callable')
              sys.exit(1)
          print('PASS: entry point hermes-voip ->', voip.value, '| register:', module.register)
          "

  # Runs the WebRTC transport tests with the optional `webrtc` extra installed
  # (websockets + pyopenssl + aioice — ADR-0016 building blocks: PR-A WSS,
  # PR-C DTLS, PR-D ICE).  Separate job so the WebRTC libraries stay out of
  # the main gate's install / licence / audit scope.  The full suite is re-run
  # so the webrtc-gated tests (which skip without the extra) execute against
  # the real libraries.
  webrtc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      # The Opus codec (media/opus.py, ADR-0032) is opuslib (in the webrtc extra) +
      # the SYSTEM libopus shared library, which opuslib dlopen's at runtime. Install
      # libopus0 explicitly — do NOT assume the runner ships it (rule 23) — or the
      # Opus suites (test_media_opus / test_media_engine_opus) would fail to import.
      - run: sudo apt-get update && sudo apt-get install -y libopus0
      - run: uv sync --frozen --extra webrtc
      # Prove all four WebRTC building-block libraries load and their modules are
      # importable: WSS transport (PR-A), DTLS keying (PR-C), ICE (PR-D), Opus codec.
      - run: uv run python -c "import websockets; from hermes_voip.transport.ws_connection import WssSipTransport; print('webrtc/wss websockets', websockets.__version__)"
      - run: uv run python -c "import OpenSSL; print('webrtc/dtls pyopenssl', OpenSSL.__version__)"
      - run: uv run python -c "import aioice; from hermes_voip.media.ice import IceConnection, IceCandidate, IceSelectedPair; print('webrtc/ice aioice', aioice.__version__)"
      - run: uv run python -c "import opuslib, ctypes.util; from hermes_voip.media.opus import OpusEncoder, OpusDecoder; assert ctypes.util.find_library('opus'); print('webrtc/opus libopus loaded')"
      - run: uv run pytest -rs
