name: gate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21" # pin uv (AGENTS.md rule 33)
          enable-cache: true
      # uv reads .python-version and provisions that interpreter; --frozen
      # installs exactly from the committed uv.lock.
      - run: uv sync --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest

  # Verifies the real hermes-agent surface still matches hermes_voip.hermes_surface
  # (the typed shim) AND type-checks + tests the VoipAdapter against the real
  # `gateway.platforms.base.BasePlatformAdapter`. The adapter imports the real
  # (un-`py.typed`) runtime, so it is excluded from the main no-hermes mypy gate
  # and checked HERE with the `hermes` extra installed (follow_untyped_imports
  # gives mypy genuine types — no `# type: ignore`/ignore_missing_imports).
  # Separate job so the heavy optional `hermes` extra and its transitive tree
  # stay out of the main gate's install / licence / audit scope.
  hermes-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      - run: uv sync --frozen --extra hermes
      # Type-check the Hermes-dependent modules against the REAL base (these are
      # excluded from the default `uv run mypy` gate; passing them explicitly
      # bypasses the exclude).
      - run: uv run mypy src/hermes_voip/adapter.py tests/test_adapter.py
      - env:
          HERMES_CONTRACT_REQUIRED: "1" # missing/drifted surface -> hard failure, never a silent skip
        run: uv run pytest tests/test_hermes_contract.py tests/test_adapter.py -rs

  # Runs the conversational-provider tests with the optional `ml` extra installed
  # (onnxruntime + sherpa-onnx + numpy). Separate job so the heavy native ML stack
  # stays out of the main gate's install / licence / audit scope. The full suite is
  # re-run here so the ml-gated provider tests (which importorskip without the extra)
  # actually execute against the real runtime.
  providers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      - run: uv sync --frozen --extra ml
      # Prove the native ML stack actually loads (the onnx_compat shim runs first).
      - run: uv run python -c "from hermes_voip.providers.onnx_compat import ensure_sherpa_loadable; ensure_sherpa_loadable(); import onnxruntime, sherpa_onnx, numpy; print('ml stack:', onnxruntime.__version__, numpy.__version__)"
      - run: uv run pytest -rs

  # Runs the SRTP media-crypto tests (RFC 3711 known-answer vectors + functional
  # suite) with the optional `media` extra installed (pyca/cryptography).  Separate
  # job so the native OpenSSL binding stays out of the main gate's install / licence /
  # audit scope.  The full suite is re-run here so the media-gated SRTP tests (which
  # importorskip without the extra) actually execute against pyca/cryptography.
  media:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      - run: uv sync --frozen --extra media
      # Prove the cryptography library loads and the SRTP module is importable.
      - run: uv run python -c "import cryptography; from hermes_voip.media.srtp import SrtpSession, SrtpError; print('media stack cryptography', cryptography.__version__)"
      - run: uv run pytest -rs

  # Runs the WebRTC ICE tests (RFC 8445 connectivity + candidate round-trips)
  # with the optional `webrtc` extra installed (aioice, BSD-3-Clause).  Separate
  # job so the ICE/STUN stack stays out of the main gate's install / licence /
  # audit scope.  The full suite is re-run here so the webrtc-gated ICE tests
  # (which importorskip without the extra) actually execute against aioice.
  # Licence: aioice (BSD-3), dnspython (ISC), ifaddr (MIT) -- all permissive.
  webrtc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      - run: uv sync --frozen --extra webrtc
      # Prove aioice loads and the ICE module is importable.
      - run: uv run python -c "import aioice; from hermes_voip.media.ice import IceConnection, IceCandidate, IceSelectedPair; print('webrtc stack aioice', aioice.__version__)"
      - run: uv run pytest -rs
