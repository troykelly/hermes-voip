name: gitleaks
on: [pull_request, push]
permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1 # pin; bump deliberately
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "${base}/${tarball}" -o "${tarball}"
          curl -fsSL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep "${tarball}" checksums.txt | sha256sum -c -
          tar -xzf "${tarball}" gitleaks
      - name: Scan full history
        run: ./gitleaks git --redact --verbose . # fetch-depth: 0 gives full history
