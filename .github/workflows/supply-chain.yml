name: supply-chain
on:
  pull_request:
    paths:
      ["pyproject.toml", "uv.lock", ".github/workflows/supply-chain.yml"]
  push:
    branches: [main]
    paths:
      ["pyproject.toml", "uv.lock", ".github/workflows/supply-chain.yml"]
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      # Install ALL optional extras (hermes, ml, media, webrtc) so the advisory
      # audit below sees the FULL transitive surface this plugin can pull in, not
      # just the (empty) default runtime deps. Most vulnerable packages reach us
      # only through an extra — e.g. pyjwt[crypto] via the `hermes` extra's auth
      # stack — and a bare `uv sync --frozen` leaves them uninstalled, so the
      # audit would report a false green. The licence gate below stays scoped to
      # PRODUCTION deps via `uv export --no-dev` (which reads the lock, ignoring
      # what is installed), so widening the install here does not widen the
      # licence-obligation surface. (AGENTS.md rules 35/36 — pip-audit is OSS.)
      - run: uv sync --frozen --all-extras
      # Advisory gate (AGENTS.md rule 35). The editable local project is not on
      # PyPI and is skipped (not a failure).
      #
      # The five PYSEC-2026-175..179 advisories are KNOWN and BLOCKED UPSTREAM:
      # they affect pyjwt 2.12.1 (fix: 2.13.0), but hermes-agent==0.16.0 hard-pins
      # `PyJWT[crypto]==2.12.1` (verified: its PyPI Requires-Dist and `uv lock`,
      # which fails "unsatisfiable" if we force pyjwt>=2.13.0). We cannot bump
      # pyjwt without an incompatible resolution, so they are suppressed by ID
      # here (rule 20 — justified, reviewable) to keep this gate ACTIONABLE: any
      # OTHER advisory — including a sixth pyjwt one or a new vuln in any extra —
      # still fails CI red. Remove these ignores the moment hermes-agent relaxes
      # its pin (tracked: ADR-0024 + the hermes-agent upstream issue). See
      # docs/runbooks/0003-supply-chain-audit.md.
      - run: >-
          uv run pip-audit
          --ignore-vuln PYSEC-2026-175
          --ignore-vuln PYSEC-2026-176
          --ignore-vuln PYSEC-2026-177
          --ignore-vuln PYSEC-2026-178
          --ignore-vuln PYSEC-2026-179
      # Licence gate (AGENTS.md rule 35), scoped to PRODUCTION deps — the licences
      # we actually ship carry the distribution obligations; dev-tooling licences
      # do not. Empty today (no runtime deps), so it passes and begins gating the
      # moment a runtime dependency is added. Permissive-OSS allowlist only —
      # extend deliberately, never to copyleft.
      - name: Licence allowlist (production deps)
        run: |
          set -euo pipefail
          uv export --frozen --no-dev --no-emit-project --no-hashes 2>/dev/null \
            | sed 's/[<>=!~; ].*//' | grep -vE '^$|^#|^-e' > runtime-pkgs.txt || true
          if [ -s runtime-pkgs.txt ]; then
            echo "Licence-checking production deps:"; cat runtime-pkgs.txt
            # --allow-only exits non-zero on any disallowed licence (no extra flag needed).
            uv run pip-licenses --packages $(tr '\n' ' ' < runtime-pkgs.txt) \
              --allow-only="MIT;MIT License;BSD License;BSD-2-Clause;BSD-3-Clause;Apache-2.0;Apache Software License;ISC;ISC License (ISCL);Python Software Foundation License;PSF-2.0;0BSD;BlueOak-1.0.0"
          else
            echo "No production dependencies to licence-check yet."
          fi
