name: supply-chain
on:
  pull_request:
    paths:
      ["pyproject.toml", "uv.lock", ".github/workflows/supply-chain.yml"]
  push:
    branches: [main]
    paths:
      ["pyproject.toml", "uv.lock", ".github/workflows/supply-chain.yml"]
  # Daily scheduled run so a newly-disclosed CVE against an UNCHANGED pinned
  # dependency is caught on cadence — not only when a dep-changing PR lands.
  # Non-:00 minute avoids fleet pile-up on shared GitHub Actions runners.
  # Schedule events carry no path context, so the path filters above do not
  # apply; the `audit` job has no `if:` condition, so it runs unconditionally
  # on every trigger including this one.  (AGENTS.md rule 35, ADR-0062.)
  schedule:
    - cron: "7 6 * * *"
  # Ad-hoc manual trigger — enables the GitHub Actions UI "Run workflow" button
  # (Actions → supply-chain → Run workflow).  Useful for on-demand CVE re-scans
  # during an incident without pushing a change to a path-filtered file.
  # Documented in docs/runbooks/0003-supply-chain-audit.md.
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      # Install ALL optional extras (hermes, ml, media, webrtc) so the advisory
      # audit below sees the FULL transitive surface this plugin can pull in, not
      # just the (empty) default runtime deps. Most vulnerable packages reach us
      # only through an extra — e.g. pyjwt[crypto] via the `hermes` extra's auth
      # stack — and a bare `uv sync --frozen` leaves them uninstalled, so the
      # audit would report a false green. The licence gate below stays scoped to
      # PRODUCTION deps via `uv export --no-dev` (which reads the lock, ignoring
      # what is installed), so widening the install here does not widen the
      # licence-obligation surface. (AGENTS.md rules 35/36 — pip-audit is OSS.)
      - run: uv sync --frozen --all-extras
      # Advisory gate (AGENTS.md rule 35). The editable local project is not on
      # PyPI and is skipped (not a failure).
      #
      # PYSEC-2026-175..179 (pyjwt 2.12.1, HIGH + medium/low, fix: 2.13.0) are
      # RESOLVED: a [tool.uv] override-dependencies in pyproject.toml forces
      # pyjwt[crypto]>=2.13.0 at the uv resolver level, superseding the
      # hermes-agent==0.16.0 hard-pin. Fully verified: uv lock resolves cleanly,
      # uv sync installs pyjwt 2.13.0, hermes-contract gate passes, pip-audit
      # reports no advisories. See ADR-0062 and docs/runbooks/0003-supply-chain-audit.md.
      - run: uv run pip-audit
      # Licence gate (AGENTS.md rule 35), scoped to PRODUCTION deps — the licences
      # we actually ship carry the distribution obligations; dev-tooling licences
      # do not. The production surface is audioop-lts + numpy (ADR-0110: numpy backs
      # the on-by-default block-NLMS AEC — a base dependency; its composite
      # "BSD-3-Clause AND 0BSD AND MIT AND Zlib AND CC0-1.0" is all-permissive and
      # already allowed in the optional-extras gate below). Permissive-OSS allowlist only —
      # extend deliberately, never to copyleft.
      - name: Licence allowlist (production deps)
        run: |
          set -euo pipefail
          uv export --frozen --no-dev --no-emit-project --no-hashes 2>/dev/null \
            | sed 's/[<>=!~; ].*//' | grep -vE '^$|^#|^-e' > runtime-pkgs.txt || true
          if [ -s runtime-pkgs.txt ]; then
            echo "Licence-checking production deps:"; cat runtime-pkgs.txt
            # --allow-only exits non-zero on any disallowed licence (no extra flag needed).
            uv run pip-licenses --packages $(tr '\n' ' ' < runtime-pkgs.txt) \
              --allow-only="MIT;MIT License;BSD License;BSD-2-Clause;BSD-3-Clause;Apache-2.0;Apache Software License;ISC;ISC License (ISCL);Python Software Foundation License;PSF-2.0;0BSD;BlueOak-1.0.0;BSD-3-Clause AND 0BSD AND MIT AND Zlib AND CC0-1.0"
          else
            echo "No production dependencies to licence-check yet."
          fi
      # Separate optional-runtime-extras report: `uv export --no-dev` alone omits
      # the hermes/ml/media/webrtc surfaces, so extra-only declared runtime
      # packages would bypass the allowlist audit. Keep the production gate above
      # for the default shipped surface and add this additive report for the
      # packages hermes-voip itself declares in `[project.optional-dependencies]`.
      - name: Licence allowlist (optional runtime extras)
        run: |
          set -euo pipefail
          uv export --frozen --all-extras --no-dev --no-emit-project --no-hashes 2>/dev/null \
            > optional-runtime-export.txt
          uv run python - optional-runtime-export.txt <<'PY' > optional-runtime-pkgs.txt
          import pathlib
          import sys

          export_path = pathlib.Path(sys.argv[1])
          package_name: str | None = None
          include_package = False
          selected: list[str] = []

          def flush() -> None:
              global package_name, include_package
              if package_name is not None and include_package:
                  selected.append(package_name)

          for raw_line in export_path.read_text().splitlines():
              line = raw_line.rstrip("\n")
              stripped = line.strip()
              if not stripped or stripped.startswith("# This file was autogenerated"):
                  continue
              if not line.startswith(" "):
                  flush()
                  package_name = stripped
                  include_package = False
                  for separator in ("<", ">", "=", "!", "~", ";", " "):
                      if separator in package_name:
                          package_name = package_name.split(separator, 1)[0]
                          break
                  continue
              if "hermes-voip" in stripped:
                  include_package = True

          flush()
          for package in sorted(set(selected)):
              print(package)
          PY
          # Fail-loud guard (rule 37). The decision — run the licence check, skip
          # because no optional-extra package is declared, or FAIL because extras
          # ARE declared but the parser produced an empty list (a false green from
          # a changed '# via hermes-voip' provenance comment) — lives in the
          # unit-tested tools.check_optional_extras_guard module, NOT inline shell.
          # It prints RUN or SKIP on stdout and exits non-zero (diagnostic on
          # stderr) on the false-green condition, which `set -e` propagates.
          decision="$(uv run python -m tools.check_optional_extras_guard \
            --pyproject pyproject.toml --packages optional-runtime-pkgs.txt)"
          if [ "$decision" = "RUN" ]; then
            echo "Licence-checking optional runtime extras deps:"; cat optional-runtime-pkgs.txt
            # --allow-only exits non-zero on any disallowed licence (no extra flag needed).
            # Exact composite strings below are current permissive-only metadata for
            # direct optional packages in the locked dependency set.
            uv run pip-licenses --packages $(tr '\n' ' ' < optional-runtime-pkgs.txt) \
              --allow-only="MIT;MIT License;BSD License;BSD-2-Clause;BSD-3-Clause;Apache-2.0;Apache Software License;ISC;ISC License (ISCL);Python Software Foundation License;PSF-2.0;0BSD;BlueOak-1.0.0;Apache-2.0 OR BSD-3-Clause;BSD-3-Clause AND 0BSD AND MIT AND Zlib AND CC0-1.0;Apache licensed, as found in the LICENSE file"
          else
            echo "No optional-runtime extra dependencies to licence-check yet."
          fi
          rm -f optional-runtime-export.txt
          rm -f optional-runtime-pkgs.txt
          rm -f runtime-pkgs.txt
