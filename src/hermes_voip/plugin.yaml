# hermes-voip — Hermes plugin manifest (ADR-0037).
#
# This is the CANONICAL plugin manifest. It is shipped two ways (both supported by
# the Hermes plugin loader):
#
#   1. As importable package data inside the `hermes_voip` wheel (force-included by
#      hatchling — see pyproject.toml). The pip / entry-point install path runs the
#      code; this file travels with it so the directory copy below can be sourced
#      from the installed package and the package is self-describing.
#
#   2. As a directory-install plugin under ~/.hermes/plugins/hermes-voip/ — this very
#      directory (plugin.yaml + __init__.py). Hermes' `hermes plugins list` and
#      `hermes plugins enable` commands are FILESYSTEM-only (verified against
#      hermes-agent 0.16.0: they never read importlib entry-point metadata), so a
#      directory manifest is what surfaces the name + version in `hermes plugins list`
#      and lets `hermes plugins enable hermes-voip` succeed. The __init__.py re-exports
#      the package's real register(), so the plugin still loads exactly once (the entry
#      point wins the load dedup). The in-session `/plugins` view's tool count comes
#      from the live registration, not from provides_tools below. See
#      docs/runbooks/0011-voip-enable-plugin.md.
#
# PUBLIC repo: this file carries env-var NAMES and fake examples only — never a real
# host, extension, password, IP, or token. Keep name/version/description in sync with
# pyproject.toml (a test asserts version parity and that provides_tools/provides_hooks
# match the tools/hooks register() actually registers).
name: hermes-voip
version: "0.0.0"
description: >-
  Two-way voice over telephony for a Hermes agent — answer and place phone calls on
  any RFC-compliant SIP-over-TLS or WebRTC voice gateway, with streaming STT/TTS, a
  prompt-injection guard, and per-call privilege gating.
author: Aperim Pty Ltd

# Gateway adapter -> kind: platform. register() calls ctx.register_platform("voip", …),
# which builds a PlatformEntry and makes Platform("voip") resolvable.
kind: platform

# The agent-facing tools register() registers via ctx.register_tool (toolset "voip").
# This list MUST match the registered set exactly — a test guards against drift.
provides_tools:
  - hang_up             # SAFE: end the current call (ADR-0026)
  - hold_call           # ELEVATED: place the caller on hold (ADR-0011)
  - resume_call         # ELEVATED: resume a held caller (ADR-0011)
  - list_registrations  # ELEVATED: list this system's registrations (ADR-0020)
  - place_call          # IRREVERSIBLE: outbound call to an approved number (ADR-0029)
  - report_call_result  # SAFE: record this call's outcome for the requester (ADR-0029)
  - send_dtmf           # ELEVATED: send in-call DTMF tones (ADR-0031)
  - open_entry          # ELEVATED: actuate the intercom entry / open the door (ADR-0031)
  - transfer_blind      # IRREVERSIBLE: DTMF-confirmed blind transfer (ADR-0010/0031)
  - transfer_attended   # IRREVERSIBLE: consultative transfer (REFER+Replaces, ADR-0048)

# The lifecycle hook register() registers via ctx.register_hook — the per-call
# privilege-clamp gate that governs every tool above.
provides_hooks:
  - pre_tool_call

# Environment variables that GATE plugin loading (Hermes prompts for any that are
# missing during `hermes plugins install` and saves them to .env). Only the genuinely
# required SIP credentials belong here — listing an optional/defaulted var would
# wrongly disable the plugin when it is absent. Rich format: name/description/url/
# secret (verified against hermes-agent 0.16.0; the field is `secret`, not `password`).
# NAMES + fake examples only.
#
# These are the SINGLE-registration credential names (the common case, == the runtime
# gate hermes_voip.plugin._REQUIRED_ENV). A multi-registration deployment uses the
# INDEXED form instead — HERMES_SIP_EXTENSION_<n> / HERMES_SIP_PASSWORD_<n> — which a
# flat requires_env list cannot express as an "either/or"; the indexed variant is
# documented in the README + runbook 0001 rather than gated here.
requires_env:
  - name: HERMES_SIP_HOST
    description: "Your SIP/WebRTC gateway's hostname (e.g. pbx.example.test)."
  - name: HERMES_SIP_EXTENSION
    description: >-
      The extension to register as (e.g. 1000). For multiple registrations use the
      indexed form HERMES_SIP_EXTENSION_<n> instead.
  - name: HERMES_SIP_PASSWORD
    description: "The SIP digest password for that extension."
    secret: true

# Optional knobs the operator may want to set — each has a safe default, or is only
# needed for a specific provider, so none of them GATE plugin loading (listing them
# under requires_env would wrongly disable the plugin when absent). The cloud provider
# keys are required ONLY when their provider is selected.
#
# RULE-27 NOTE (verified against hermes-agent 0.16.0): the `hermes plugins install`
# prompt reads ONLY `requires_env` — it does NOT prompt for `optional_env`, and no
# other loader code path reads this key. It is kept here as in-manifest documentation
# of the supported knobs (and because the Hermes plugin guide lists optional_env as a
# recognised platform-manifest key); it is the README + docs/runbooks that operators
# actually configure these from, NOT an install prompt. Same rich format as above.
optional_env:
  - name: HERMES_SIP_PORT
    description: "SIP signalling port (TLS is 5061 by default; 5060 is UDP and fails TLS)."
  - name: HERMES_SIP_TRANSPORT
    description: "Signalling transport: tls (default) or wss (WebRTC)."
  - name: HERMES_VOIP_GREETING
    description: "What the agent says when it answers an inbound call."
  - name: HERMES_VOIP_TTS_MODEL
    description: "Path to the local Kokoro voice model dir (self-host TTS, the default)."
  - name: HERMES_VOIP_STT_MODEL_DIR
    description: "Path to the local sherpa-onnx speech-to-text model dir (self-host STT, the default)."
  - name: HERMES_VOIP_VAD_MODEL_DIR
    description: "Path to the local Silero VAD model dir (always required — runs on every call)."
  - name: HERMES_VOIP_INJECTION_GUARD_MODEL_DIR
    description: "Path to the local prompt-injection guard model dir (always required — screens caller speech)."
  - name: HERMES_VOIP_TTS_PROVIDER
    description: "TTS backend: sherpa-kokoro (default), elevenlabs, cartesia, aura2, piper, kittentts, kyutai."
  - name: ELEVENLABS_API_KEY
    description: "ElevenLabs API key — required only when HERMES_VOIP_TTS_PROVIDER=elevenlabs."
    url: "https://elevenlabs.io/app/settings/api-keys"
    secret: true
  - name: HERMES_VOIP_STT_PROVIDER
    description: "STT backend: sherpa-onnx (default) or deepgram."
  - name: DEEPGRAM_API_KEY
    description: "Deepgram API key — required only when HERMES_VOIP_STT_PROVIDER=deepgram (or TTS aura2)."
    url: "https://console.deepgram.com/"
    secret: true
